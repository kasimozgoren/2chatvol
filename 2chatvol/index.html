<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sohbet Uygulaması</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="active">
        <h2>Karakterini Seç</h2>
        <div class="user-select">
            <div class="user-card" onclick="selectUser('merve')">
                <img src="assets/images/merve.png" alt="Merve" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4140/4140047.png'">
                <h3>Merve</h3>
                <span id="badge-merve" class="badge hidden">0</span>
            </div>
            <div class="user-card" onclick="selectUser('kasim')">
                <img src="assets/images/kasim.png" alt="Kasım" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4140/4140048.png'">
                <h3>Kasım</h3>
                <span id="badge-kasim" class="badge hidden">0</span>
            </div>
        </div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <h2 id="chat-title">Sohbet</h2>
            <button onclick="logout()" class="logout-btn">Çıkış</button>
        </div>

        <div class="chat-box" id="chat-box">
            </div>

        <div id="audio-preview-container" class="hidden">
            <div class="custom-audio-player">
                <button id="custom-play-pause-btn">▶️</button>
                <input type="range" id="custom-seek-bar" value="0" step="0.1">
                <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
                <audio id="audio-playback" style="display: none;"></audio>
            </div>
            <div class="preview-actions">
                <button id="cancel-audio-btn">İptal ❌</button>
                <button id="send-audio-btn">Gönder 📤</button>
            </div>
        </div>

        <div class="chat-input-area">
            <button id="record-btn" class="mic-btn">🎤</button>
            <button id="stop-record-btn" class="mic-btn recording hidden">⏹️ <span id="recording-time">00:00</span></button>
            <div id="recording-animation" class="hidden">Kayıt... 🔴</div>
            
            <input type="text" id="message-input" placeholder="Bir şeyler yaz...">
            <button id="send-text-btn" class="send-btn">Gönder</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
